ai_usage_summary: |
  Used GitHub Copilot for code completion and repository organization.
  Used Antigravity IDE with Gemini and Claude for design review, ranking logic
  discussion, and repository workflow guidance.
  No candidate data was shared with any external AI model during development.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid rule-based ranking with semantic reranking. We extract structured
  features from candidate profiles and apply trap detection for honeypots,
  keyword stuffers, and duplicate behavioral twins. The pipeline scores each
  candidate using skill, title, experience, career, behavior, and location
  signals, then applies a semantic reranker over the top 500 candidates to
  refine the final Top 100. The output is written in the required submission
  format and validated for 100 ranked rows with monotonic decreasing scores.

